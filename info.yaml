project:
  title:        "PolyWave"
  author:       "Riccardo Pellegrini"
  discord:      ""
  description:  "Four-channel waveform generator driving four 16-bit R-2R DACs with DDS, modulation and test patterns."
  language:     "Analog"
  clock_hz:     50000000

  tiles: "1x2"

  analog_pins: 4
  uses_vapwr: true

  top_module:  "tt_um_odgrip_polywave"

  source_files:
    - "tt_um_odgrip_polywave.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "CFG_DATA"
  ui[1]: "CFG_CLK"
  ui[2]: "CFG_LATCH"
  ui[3]: "MODE0"
  ui[4]: "MODE1"
  ui[5]: "SCENE0"
  ui[6]: "SCENE1"
  ui[7]: "ENABLE"

  # Outputs
  uo[0]: "STATUS0"
  uo[1]: "STATUS1"
  uo[2]: "STATUS2"
  uo[3]: "STATUS3"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins
  ua[0]: "DAC_A"
  ua[1]: "DAC_B"
  ua[2]: "DAC_C"
  ua[3]: "DAC_D"
  ua[4]: ""
  ua[5]: ""
# Do not change!
yaml_version: 6
